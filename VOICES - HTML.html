<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Modern animated gradient background */
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #050816);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            background: -webkit-linear-gradient(#fff, #8db8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            margin-bottom: 30px;
        }

        select {
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
            transition: all 0.3s;
        }

        select:focus, select:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #4da3ff;
        }

        select option {
            background: #203a43;
            color: white;
        }

        #status {
            font-size: 18px;
            color: #b0c4de;
            margin-bottom: 40px;
            min-height: 54px; /* Prevents layout jump */
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
        }

        .mic-container {
            position: relative;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .mic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1d4ed8, #4da3ff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
            z-index: 10;
        }

        .mic:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(77, 163, 255, 0.6);
        }

        .listening {
            animation: pulse-ring 1.5s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            background: linear-gradient(135deg, #ef4444, #f87171);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 40px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .wave {
            position: absolute;
            bottom: -40px;
            height: 40px;
            display: none;
            justify-content: center;
            align-items: flex-end;
            gap: 6px;
        }

        .wave span {
            width: 8px;
            height: 10px;
            background: #4da3ff;
            border-radius: 4px;
            animation: wave 0.8s infinite ease-in-out;
        }

        .wave span:nth-child(2) { animation-delay: 0.1s; }
        .wave span:nth-child(3) { animation-delay: 0.2s; }
        .wave span:nth-child(4) { animation-delay: 0.3s; }
        .wave span:nth-child(5) { animation-delay: 0.4s; }
        .wave span:nth-child(6) { animation-delay: 0.5s; }
        .wave span:nth-child(7) { animation-delay: 0.6s; }

        @keyframes wave {
            0%, 100% { height: 10px; background: #4da3ff; }
            50% { height: 40px; background: #ef4444; }
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .glass-panel { padding: 30px 20px; }
            h1 { font-size: 28px; }
            .mic { width: 90px; height: 90px; font-size: 36px; }
            #status { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>Voice Assistant</h1>
    
    <div class="controls">
        <select id="lang-select">
            <option value="en-US" selected>English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="es-ES">Spanish (Spain)</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="it-IT">Italian</option>
            <option value="pt-BR">Portuguese (Brazil)</option>
            <option value="hi-IN">Hindi</option>
            <option value="zh-CN">Chinese (Mandarin)</option>
            <option value="ja-JP">Japanese</option>
            <option value="ko-KR">Korean</option>
            <option value="ru-RU">Russian</option>
            <option value="ar-SA">Arabic</option>
        </select>
    </div>

    <p id="status">Tap the microphone and start speaking</p>

    <div class="mic-container">
        <div class="mic" id="mic">🎙️</div>
        
        <div class="wave" id="wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</div>

<script>
    const mic = document.getElementById("mic");
    const status = document.getElementById("status");
    const wave = document.getElementById("wave");
    const langSelect = document.getElementById("lang-select");

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();

        // Configure basic settings
        recognition.continuous = false;
        recognition.interimResults = true; // Show results while speaking

        mic.onclick = () => {
            // Set the language dynamically right before starting
            recognition.lang = langSelect.value;
            
            try {
                recognition.start();
            } catch (e) {
                // Prevents error if user clicks while it's already listening
                console.log("Recognition is already running");
            }
        };

        recognition.onstart = () => {
            status.innerHTML = "Listening...";
            status.style.color = "#ef4444";
            mic.classList.add("listening");
            wave.style.display = "flex";
        };

        recognition.onresult = (event) => {
            // interimResults = true allows us to see words forming in real-time
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript;
                } else {
                    interimTranscript += transcript;
                }
            }

            status.style.color = "white";
            status.innerHTML = finalTranscript || interimTranscript;
        };

        recognition.onend = () => {
            mic.classList.remove("listening");
            wave.style.display = "none";
            
            if (status.innerHTML === "Listening...") {
                status.innerHTML = "Didn't catch that. Try again.";
                status.style.color = "#b0c4de";
            }
        };

        recognition.onerror = (event) => {
            mic.classList.remove("listening");
            wave.style.display = "none";
            status.style.color = "#ef4444";
            
            if (event.error === 'no-speech') {
                status.innerHTML = "No speech detected.";
            } else if (event.error === 'audio-capture') {
                status.innerHTML = "Microphone not found.";
            } else if (event.error === 'not-allowed') {
                status.innerHTML = "Microphone access denied.";
            } else {
                status.innerHTML = "Error occurred: " + event.error;
            }
        };
    } else {
        mic.style.display = "none";
        status.style.color = "#ef4444";
        status.innerHTML = "Your browser does not support Speech Recognition. Try Chrome or Edge.";
    }
</script>

</body>
</html>
